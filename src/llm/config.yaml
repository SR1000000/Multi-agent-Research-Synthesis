# Router group aliases: optional per-model-row ``model_name`` assigns a deployment to an alias
# (default for ``providers`` is ``default_model_name``; for ``fallback_providers`` it is
# ``fallback_model_name``). Use ``_call(..., model="writer")`` etc. to target an alias.
#
# Example (commented):
#   models:
#     - model: "gemini/gemini-2.5-pro"
#       model_name: "app"
#     - model: "gemini/gemini-2.5-flash"
#       model_name: "writer"

router:
  default_model_name: "app"
  fallback_model_name: "fallback"
  fallbacks:
    - app: ["fallback"]
    # - context: ["fallback"]
    # - writer: ["fallback"]
    # - fast: ["fallback"]

  providers:
    gemini:
      api_key: "os.environ/GEMINI_API_KEY"
      models:
        - model: "gemini/gemini-3.1-flash-lite-preview"
          model_name: "slides"
        - model: "gemini/gemini-3-flash-preview"
        - model: "gemini/gemini-2.5-flash-lite"
        - model: "gemini/gemini-2.5-pro"
        - model: "gemini/gemini-2.5-flash"
        - model: "gemini/gemini-2.5-flash-lite"

    nvidia_nim:
      api_key: "os.environ/NVIDIA_NIM_API_KEY"
      api_base: "os.environ/NVIDIA_NIM_BASE_URL"
      models:
        - model: "nvidia_nim/mistralai/mistral-large-3-675b-instruct-2512"
          model_name: "context"
        - model: "nvidia_nim/mistralai/mistral-medium-3-instruct"
          model_name: "context"
        - model: "nvidia_nim/vlm/google/paligemma"
          model_name: "context"
        - model: "nvidia_nim/microsoft/phi-4-multimodal-instruct"
          model_name: "context"

  fallback_providers:
    openrouter:
      api_key: "os.environ/OPENROUTER_API_KEY"
      api_base: "os.environ/OPENROUTER_BASE_URL"
      models:
        - model: "openrouter/openai/gpt-oss-120b:free"
        - model: "openrouter/openai/gpt-oss-20b:free"

    ollama:
      api_key: "os.environ/OLLAMA_API_KEY"
      api_base: "os.environ/OLLAMA_BASE_URL"
      models:
        - model: "ollama/qwen3.5:397b-cloud"
        - model: "ollama/gemma3:27b-cloud"
        - model: "ollama/qwen3.5:397b-cloud"
          model_name: "context"
        - model: "ollama/qwen3-vl:235b-instruct-cloud"
          model_name: "context"
        - model: "ollama/gemini-3-flash-preview:cloud"
          model_name: "context"

  settings:
    num_retries: 2
    retry_after: 2
    cooldown_time: 30
    enable_pre_call_checks: true
    timeout: 120
