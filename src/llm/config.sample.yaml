# Config split:
# - providers: provider credentials/shared params plus the allowed model catalog
# - groups: logical aliases used by the app, each listing concrete <provider>/<model_name> entries
# - litellm: Router runtime settings only
# Current sample assumes free teir for Gemini, Ollama and OpenRouter.
# Get available OpenRouter free models at https://openrouter.ai/collections/free-models (changes frequently).
# See also https://github.com/mnfst/awesome-free-llm-apis (model lists likely outdated).  LiteLLM implements most of those (https://docs.litellm.ai/docs/providers).
# A free OpenRouter account only gets 50 daily requests, adding minimum of 10 credits "verifies" your account and raises the daily limit to 1000 requests

providers:
  gemini:
    shared:
      api_key: "os.environ/GEMINI_API_KEY"
    models:
      gemini-3.1-flash-lite-preview:
        max_parallel_requests: 5
        rpm: 15
      gemma-4-31b-it:
        max_parallel_requests: 5
        rpm: 15
      gemma-3-27b-it:
        max_parallel_requests: 5
        rpm: 30
      gemini-3-flash-preview: {}
      gemini-2.5-flash: 
        rpm: 5
      gemini-2.5-flash-lite:
        rpm: 10

  openrouter:
    shared:
      api_key: "os.environ/OPENROUTER_API_KEY"
      api_base: "os.environ/OPENROUTER_BASE_URL"
    models:
      nvidia/nemotron-3-super-120b-a12b:free: {}
      qwen/qwen3-coder:free: {}
      qwen/qwen3-next-80b-a3b-instruct:free: {}
      inclusionai/ling-2.6-flash:free: {}
      google/gemma-4-26b-a4b-it:free:
        max_parallel_requests: 2
      google/gemma-4-31b-it:free:
        max_parallel_requests: 2
      google/gemma-3-4b-it:free:
        max_parallel_requests: 2
      google/gemma-3-12b-it:free:
        max_parallel_requests: 2
      google/gemma-3-27b-it:free:
        max_parallel_requests: 2
      nvidia/nemotron-nano-12b-v2-vl:free: {}
      openai/gpt-oss-120b:free: {}

  ollama:
    shared:
      api_key: "os.environ/OLLAMA_API_KEY"
      api_base: "os.environ/OLLAMA_BASE_URL"
    models:
      qwen3.5:397b-cloud:
        timeout: 240
      minimax-m2.7:cloud: {}  # Tends to validation error
      gemma4:31b-cloud:
        max_parallel_requests: 5
      gemma3:4b-cloud:
        max_parallel_requests: 5
      gemma3:12b-cloud:
        max_parallel_requests: 5
      gemma3:27b-cloud:
        max_parallel_requests: 5
      qwen3-vl:235b-instruct-cloud:
        max_parallel_requests: 5
      qwen3-vl:235b-cloud:
        max_parallel_requests: 5
      gemini-3-flash-preview:cloud:
        max_parallel_requests: 5

  mistral:
    shared:
      api_key: "os.environ/MISTRAL_API_KEY"
    models:
      mistral-large-latest:
        tpm: 50000
      mistral-large-2411:
        tpm: 300000
        rpm: 60
      mistral-medium-latest:
        tpm: 375000
        rpm: 25
      mistral-medium-2508:
        tpm: 375000
        rpm: 25
      mistral-medium-2505:
        tpm: 60000
        rpm: 60
      mistral-small-2603:
        tpm: 150000
        rpm: 40

      magistral-medium-latest:
        tpm: 75000
        rpm: 5
      magistral-small-latest:
        tpm: 75000
        rpm: 5

      ministral-14b-2512:
        rpm: 30

  nvidia_nim:
    shared:
      api_key: "os.environ/NVIDIA_NIM_API_KEY"
    models:
      #deepseek-ai/deepseek-v4-flash: {}
      #deepseek-ai/deepseek-v4-pro: {}
      deepseek-ai/deepseek-v3.2:
        rpm: 40
      #z-ai/glm4.7: {}  # empty assistant message?
      nvidia/nemotron-4-340b-reward: {} # Unsupported parameters?
      mistralai/mistral-large-3-675b-instruct-2512: {}
      mistralai/mistral-nemotron:
        rpm: 40
      z-ai/glm4.7: 
        rpm: 40
      google/gemma-3-27b-it: {}
      microsoft/phi-4-multimodal-instruct: {}

  groq:
    shared:
      api_key: "os.environ/GROQ_API_KEY"
    models:
      meta-llama/llama-4-scout-17b-16e-instruct:
        tpm: 30000
      llama-3.3-70b-versatile:
        tpm: 12000

groups:
  app:
    models:
      - "gemini/gemini-3.1-flash-lite-preview"
      - "groq/llama-3.3-70b-versatile"
    fallbacks:
      - "fallback"

  planner:
    models:
      - "nvidia_nim/deepseek-ai/deepseek-v3.2"
      - "ollama/qwen3.5:397b-cloud"
      - "mistral/mistral-large-2411"
    fallbacks:
      - "planner"
      - "planner-fallback"

  planner-fallback:
    models:
      - "mistral/mistral-medium-2508"
      - "openrouter/nvidia/nemotron-3-super-120b-a12b:free"
      - "nvidia_nim/mistralai/mistral-nemotron"
    fallbacks:
      - "planner"
      - "fallback"

  supervisor:
    models:
      - "gemini/gemma-4-31b-it"
      - "gemini/gemini-3.1-flash-lite-preview"
    fallbacks:
      - "supervisor"
      - "fallback"

  slides:
    models:
      - "mistral/mistral-large-2411"
      #- "nvidia_nim/mistralai/mistral-large-3-675b-instruct-2512"
      - "mistral/mistral-medium-latest"
      - "nvidia_nim/z-ai/glm4.7"
      - "nvidia_nim/deepseek-ai/deepseek-v3.2"
      - "openrouter/qwen/qwen3-next-80b-a3b-instruct:free"
      - "gemini/gemini-3.1-flash-lite-preview"
    fallbacks:
      - "slides"
      - "fallback"

  critic:
    models:
      - "nvidia_nim/mistralai/mistral-nemotron"
      - "mistral/magistral-medium-latest"
      - "openrouter/nvidia/nemotron-3-super-120b-a12b:free"
      - "openrouter/qwen/qwen3-coder:free"
      - "ollama/qwen3.5:397b-cloud"
    fallbacks:
      - "critic"
      - "fallback"

  context-vision:
    models:
      - "gemini/gemma-4-31b-it"
      - "gemini/gemma-3-27b-it"
      - "groq/meta-llama/llama-4-scout-17b-16e-instruct"
      - "mistral/mistral-medium-2505"
      - "mistral/ministral-14b-2512"
      - "mistral/mistral-small-2603"
      - "gemini/gemini-3-flash-preview"
      - "gemini/gemini-2.5-flash"
      - "gemini/gemini-2.5-flash-lite"
      - "gemini/gemini-3.1-flash-lite-preview"
      - "ollama/gemma4:31b-cloud"
      - "ollama/qwen3-vl:235b-instruct-cloud"
      - "ollama/qwen3-vl:235b-cloud"
      - "ollama/gemini-3-flash-preview:cloud"
      - "nvidia_nim/microsoft/phi-4-multimodal-instruct"
      - "openrouter/google/gemma-4-26b-a4b-it:free"
      - "openrouter/google/gemma-4-31b-it:free"
      - "openrouter/google/gemma-3-12b-it:free"
      - "openrouter/google/gemma-3-27b-it:free"
    fallbacks:
      - "context-vision"

  context:
    models:
      - "gemini/gemma-4-31b-it"
      - "groq/llama-3.3-70b-versatile"
      - "openrouter/nvidia/nemotron-nano-12b-v2-vl:free"
      - "openrouter/openai/gpt-oss-120b:free"
      - "ollama/gemma3:27b-cloud"
      - "ollama/gemma3:12b-cloud"
    fallbacks:
      - "context"
      - "context-vision"
      - "fallback"

  fallback:
    models:
      - "mistral/mistral-large-2411"
      - "mistral/mistral-medium-2508"
      - "mistral/magistral-medium-latest"
      - "nvidia_nim/z-ai/glm4.7"
      - "ollama/minimax-m2.7:cloud"
      - "gemini/gemma-4-31b-it"
      - "ollama/gemma4:31b-cloud"
    fallbacks:
      - "fallback"

litellm:
  default_group: "app"
  router:
    num_retries: 1
    retry_after: 3
    cooldown_time: 30
    enable_pre_call_checks: true
    timeout: 120
    routing_strategy: "latency-based-routing"
